name: Lint
on: [push]
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Pylint
        run: sudo apt-get install --yes pylint
      - name: Analyse code
        run: |
          find . -not -path "*/[._]*" -type f -name "*.py" | xargs \
              pylint --errors-only --ignored-modules=pygame
